      <p class="hero-label">Enterprise IT &amp; Cloud Partner</p>

      <p class="subtitle">{{ subtitle }}</p>

        <a class="btn primary" routerLink="/contact">Book a Free Consultation</a>
        <a class="btn ghost" routerLink="/services">Explore Services</a>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><strong>50+</strong><span>Projects Delivered</span></div>

        <div class="hero-stat"><strong>100%</strong><span>Client Satisfaction</span></div>
