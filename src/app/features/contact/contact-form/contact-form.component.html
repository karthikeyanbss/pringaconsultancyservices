<form [formGroup]="contactForm" (ngSubmit)="submit()" class="contact-form-root">
  <!-- Success Message -->
  <div *ngIf="submitSuccess" class="form-success">
    ✓ Your message has been sent successfully!
  </div>

  <!-- Error Message -->
  <div *ngIf="submitError" class="form-error-banner">
    ✕ {{ submitError }}
  </div>

  <div class="form-group">
    <label for="name" class="form-label">Your name <span class="required">*</span></label>
    <input
      id="name"
      type="text"
      formControlName="name"
      placeholder="John Doe"
      class="form-input"
      [class.invalid]="contactForm.get('name')?.touched && contactForm.get('name')?.invalid"
      [disabled]="isSubmitting"
    />
    <div *ngIf="contactForm.get('name')?.touched && contactForm.get('name')?.invalid" class="form-error">
      ⚠ Name is required (minimum 2 characters)
    </div>
  </div>

  <div class="form-group">
    <label for="email" class="form-label">Your email <span class="required">*</span></label>
    <input
      id="email"
      type="email"
      formControlName="email"
      placeholder="john@example.com"
      class="form-input"
      [class.invalid]="contactForm.get('email')?.touched && contactForm.get('email')?.invalid"
      [disabled]="isSubmitting"
    />
    <div *ngIf="contactForm.get('email')?.touched && contactForm.get('email')?.invalid" class="form-error">
      ⚠ Valid email is required
    </div>
  </div>

  <div class="form-group">
    <label for="subject" class="form-label">Subject</label>
    <input
      id="subject"
      type="text"
      formControlName="subject"
      placeholder="Project Inquiry"
      class="form-input"
      [disabled]="isSubmitting"
    />
  </div>

  <div class="form-group">
    <label for="message" class="form-label">Your message (optional)</label>
    <textarea
      id="message"
      formControlName="message"
      placeholder="Tell us about your project..."
      rows="5"
      class="form-textarea"
      [class.invalid]="contactForm.get('message')?.touched && contactForm.get('message')?.invalid"
      [disabled]="isSubmitting"
    ></textarea>
    <div *ngIf="contactForm.get('message')?.touched && contactForm.get('message')?.invalid" class="form-error">
      ⚠ Message must be at least 10 characters
    </div>
  </div>

  <button 
    type="submit" 
    class="btn primary form-submit" 
    [disabled]="contactForm.invalid || isSubmitting"
  >
    <span *ngIf="!isSubmitting">Send Message</span>
    <span *ngIf="isSubmitting">Sending...</span>
  </button>
</form>
