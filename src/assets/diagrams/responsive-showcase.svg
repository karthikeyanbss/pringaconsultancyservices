<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 265" font-family="'Inter','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7fc"/>
      <stop offset="1" stop-color="#eaeff8"/>
    </linearGradient>
    <linearGradient id="devFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2a3e"/>
      <stop offset="1" stop-color="#141e2e"/>
    </linearGradient>
    <linearGradient id="navBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f8ef7"/>
      <stop offset="1" stop-color="#a259ff"/>
    </linearGradient>
    <clipPath id="deskClip">
      <rect x="12" y="20" width="300" height="188" rx="3"/>
    </clipPath>
    <clipPath id="tabClip">
      <rect x="303" y="40" width="118" height="166" rx="3"/>
    </clipPath>
    <clipPath id="phoneClip">
      <rect x="419" y="60" width="72" height="138" rx="3"/>
    </clipPath>
  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!-- DESKTOP MONITOR                           -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Monitor body -->
  <rect x="8" y="16" width="308" height="196" rx="8" fill="url(#devFrame)" stroke="#2a3a55" stroke-width="1.2"/>
  <!-- Screen bezel inner -->
  <rect x="12" y="20" width="300" height="188" rx="3" fill="url(#screenBg)"/>

  <!-- === Desktop Screen Content === -->
  <g clip-path="url(#deskClip)">
    <!-- Nav bar -->
    <rect x="12" y="20" width="300" height="20" fill="#ffffff"/>
    <rect x="12" y="20" width="300" height="3" fill="url(#navBar)"/>
    <text x="20" y="34" fill="#1a2035" font-size="7.5" font-weight="700">OnlineShop</text>
    <rect x="240" y="25" width="22" height="8" rx="2" fill="#eaf0fb"/>
    <rect x="265" y="25" width="22" height="8" rx="2" fill="#eaf0fb"/>
    <rect x="290" y="25" width="16" height="8" rx="2" fill="#eaf0fb"/>

    <!-- Page title -->
    <text x="20" y="52" fill="#1a2035" font-size="11" font-weight="700">Products</text>
    <rect x="20" y="55" width="28" height="2.5" rx="1" fill="#4f8ef7" opacity="0.7"/>

    <!-- ── ROW 1 ── -->
    <!-- Card 1: Sofa -->
    <rect x="20" y="62" width="86" height="60" rx="5" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="20" y="62" width="86" height="36" rx="5" fill="#c8dcf5"/>
    <rect x="20" y="93" width="86" height="5" rx="0" fill="#c8dcf5"/> <!-- close top-corners -->
    <text x="63" y="111" text-anchor="middle" fill="#444" font-size="7">Modular Sofa</text>
    <text x="63" y="120" text-anchor="middle" fill="#2266cc" font-size="8" font-weight="700">$299</text>

    <!-- Card 2: Lamp -->
    <rect x="115" y="62" width="86" height="60" rx="5" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="115" y="62" width="86" height="36" rx="5" fill="#fde8d0"/>
    <rect x="115" y="93" width="86" height="5" rx="0" fill="#fde8d0"/>
    <text x="158" y="111" text-anchor="middle" fill="#444" font-size="7">Table Lamp</text>
    <text x="158" y="120" text-anchor="middle" fill="#2266cc" font-size="8" font-weight="700">$49</text>

    <!-- Card 3: Chair -->
    <rect x="210" y="62" width="86" height="60" rx="5" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="210" y="62" width="86" height="36" rx="5" fill="#d0f0dc"/>
    <rect x="210" y="93" width="86" height="5" rx="0" fill="#d0f0dc"/>
    <text x="253" y="111" text-anchor="middle" fill="#444" font-size="7">Accent Chair</text>
    <text x="253" y="120" text-anchor="middle" fill="#2266cc" font-size="8" font-weight="700">$189</text>

    <!-- ── ROW 2 ── -->
    <!-- Card 4 -->
    <rect x="20" y="130" width="86" height="60" rx="5" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="20" y="130" width="86" height="36" rx="5" fill="#eddcf5"/>
    <rect x="20" y="161" width="86" height="5" rx="0" fill="#eddcf5"/>
    <text x="63" y="179" text-anchor="middle" fill="#444" font-size="7">Mug Set</text>
    <text x="63" y="188" text-anchor="middle" fill="#2266cc" font-size="8" font-weight="700">$24</text>

    <!-- Card 5 -->
    <rect x="115" y="130" width="86" height="60" rx="5" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="115" y="130" width="86" height="36" rx="5" fill="#fdf5d0"/>
    <rect x="115" y="161" width="86" height="5" rx="0" fill="#fdf5d0"/>
    <text x="158" y="179" text-anchor="middle" fill="#444" font-size="7">Bookshelf</text>
    <text x="158" y="188" text-anchor="middle" fill="#2266cc" font-size="8" font-weight="700">$139</text>

    <!-- Card 6 -->
    <rect x="210" y="130" width="86" height="60" rx="5" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="210" y="130" width="86" height="36" rx="5" fill="#d0eef5"/>
    <rect x="210" y="161" width="86" height="5" rx="0" fill="#d0eef5"/>
    <text x="253" y="179" text-anchor="middle" fill="#444" font-size="7">Plant Pot</text>
    <text x="253" y="188" text-anchor="middle" fill="#2266cc" font-size="8" font-weight="700">$32</text>
  </g>

  <!-- Monitor stand -->
  <rect x="146" y="212" width="48" height="12" rx="3" fill="url(#devFrame)"/>
  <rect x="120" y="224" width="100" height="8" rx="4" fill="url(#devFrame)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- TABLET (portrait)                         -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="298" y="34" width="130" height="178" rx="12" fill="url(#devFrame)" stroke="#2a3a55" stroke-width="1.2"/>
  <!-- Screen -->
  <rect x="303" y="40" width="118" height="166" rx="3" fill="url(#screenBg)"/>
  <!-- Home button -->
  <circle cx="363" cy="220" r="6" fill="#1e2a3e" stroke="#2a3a55" stroke-width="1"/>

  <!-- === Tablet Screen Content === -->
  <g clip-path="url(#tabClip)">
    <!-- Nav -->
    <rect x="303" y="40" width="118" height="16" fill="#ffffff"/>
    <rect x="303" y="40" width="118" height="2.5" fill="url(#navBar)"/>
    <text x="309" y="52" fill="#1a2035" font-size="6.5" font-weight="700">OnlineShop</text>
    <!-- Title -->
    <text x="309" y="67" fill="#1a2035" font-size="9" font-weight="700">Products</text>
    <rect x="309" y="70" width="22" height="2" rx="1" fill="#4f8ef7" opacity="0.7"/>

    <!-- 2-col grid -->
    <!-- Row 1 -->
    <rect x="309" y="75" width="52" height="46" rx="4" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="309" y="75" width="52" height="27" rx="4" fill="#c8dcf5"/>
    <rect x="309" y="97" width="52" height="5" fill="#c8dcf5"/>
    <text x="335" y="112" text-anchor="middle" fill="#444" font-size="5.5">Modular Sofa</text>
    <text x="335" y="119" text-anchor="middle" fill="#2266cc" font-size="6.5" font-weight="700">$299</text>

    <rect x="369" y="75" width="52" height="46" rx="4" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="369" y="75" width="52" height="27" rx="4" fill="#fde8d0"/>
    <rect x="369" y="97" width="52" height="5" fill="#fde8d0"/>
    <text x="395" y="112" text-anchor="middle" fill="#444" font-size="5.5">Table Lamp</text>
    <text x="395" y="119" text-anchor="middle" fill="#2266cc" font-size="6.5" font-weight="700">$49</text>

    <!-- Row 2 -->
    <rect x="309" y="128" width="52" height="46" rx="4" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="309" y="128" width="52" height="27" rx="4" fill="#d0f0dc"/>
    <rect x="309" y="150" width="52" height="5" fill="#d0f0dc"/>
    <text x="335" y="165" text-anchor="middle" fill="#444" font-size="5.5">Accent Chair</text>
    <text x="335" y="172" text-anchor="middle" fill="#2266cc" font-size="6.5" font-weight="700">$189</text>

    <rect x="369" y="128" width="52" height="46" rx="4" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="369" y="128" width="52" height="27" rx="4" fill="#eddcf5"/>
    <rect x="369" y="150" width="52" height="5" fill="#eddcf5"/>
    <text x="395" y="165" text-anchor="middle" fill="#444" font-size="5.5">Mug Set</text>
    <text x="395" y="172" text-anchor="middle" fill="#2266cc" font-size="6.5" font-weight="700">$24</text>
  </g>

  <!-- ══════════════════════════════════════════ -->
  <!-- PHONE (portrait)                          -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="415" y="54" width="84" height="156" rx="14" fill="url(#devFrame)" stroke="#2a3a55" stroke-width="1.2"/>
  <!-- Notch -->
  <rect x="440" y="57" width="32" height="7" rx="4" fill="#141e2e"/>
  <!-- Screen -->
  <rect x="419" y="60" width="72" height="138" rx="3" fill="url(#screenBg)"/>
  <!-- Home pill -->
  <rect x="447" y="203" width="24" height="4" rx="2" fill="#1e2a3e"/>

  <!-- === Phone Screen Content === -->
  <g clip-path="url(#phoneClip)">
    <!-- Nav -->
    <rect x="419" y="60" width="72" height="14" fill="#ffffff"/>
    <rect x="419" y="60" width="72" height="2" fill="url(#navBar)"/>
    <text x="423" y="70" fill="#1a2035" font-size="5.5" font-weight="700">OnlineShop</text>
    <!-- Title -->
    <text x="423" y="83" fill="#1a2035" font-size="8" font-weight="700">Products</text>
    <rect x="423" y="85" width="18" height="2" rx="1" fill="#4f8ef7" opacity="0.7"/>

    <!-- 1-col cards -->
    <rect x="423" y="90" width="64" height="42" rx="4" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="423" y="90" width="64" height="24" rx="4" fill="#c8dcf5"/>
    <rect x="423" y="109" width="64" height="5" fill="#c8dcf5"/>
    <text x="455" y="123" text-anchor="middle" fill="#444" font-size="5">Modular Sofa</text>
    <text x="455" y="130" text-anchor="middle" fill="#2266cc" font-size="6" font-weight="700">$299</text>

    <rect x="423" y="137" width="64" height="42" rx="4" fill="#ffffff" stroke="#e2e8f4" stroke-width="0.5"/>
    <rect x="423" y="137" width="64" height="24" rx="4" fill="#fde8d0"/>
    <rect x="423" y="156" width="64" height="5" fill="#fde8d0"/>
    <text x="455" y="170" text-anchor="middle" fill="#444" font-size="5">Table Lamp</text>
    <text x="455" y="177" text-anchor="middle" fill="#2266cc" font-size="6" font-weight="700">$49</text>
  </g>

  <!-- Bottom label strip -->
  <text x="270" y="252" text-anchor="middle" fill="#3a4f68" font-size="11" letter-spacing="1.5" font-weight="600">RESPONSIVE ON EVERY DEVICE</text>
  <!-- dots -->
  <circle cx="228" cy="248" r="2.5" fill="#4f8ef7" opacity="0.6"/>
  <circle cx="312" cy="248" r="2.5" fill="#a259ff" opacity="0.6"/>
</svg>
