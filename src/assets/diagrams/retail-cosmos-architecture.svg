<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 345" font-family="'Inter','Segoe UI',sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,1 9,4 0,7" fill="#4f8ef7" opacity="0.95"/>
    </marker>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#192238"/>
      <stop offset="1" stop-color="#0f1728"/>
    </linearGradient>
    <linearGradient id="topbadge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f8ef7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#a259ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="345" rx="14" fill="#090d1a" stroke="#1a2b40" stroke-width="1"/>
  <!-- Ambient glow behind centre node -->
  <ellipse cx="322" cy="172" rx="160" ry="90" fill="#1a3a6a" opacity="0.09"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="520" height="4" rx="14" fill="url(#topbadge)"/>

  <!-- Title -->
  <text x="260" y="26" text-anchor="middle" fill="#4a6080" font-size="11" letter-spacing="2" font-weight="500">RETAIL &amp; E-COMMERCE · AZURE ARCHITECTURE</text>

  <!-- ── CONNECTIONS ── -->
  <!-- Browser → Web App -->
  <line x1="85" y1="172" x2="163" y2="172" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Web App top-centre → up → right → Storage left edge -->
  <polyline points="190,146 190,82 294,82" fill="none" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Web App right → Cosmos Product left -->
  <line x1="217" y1="172" x2="295" y2="172" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cosmos Product bottom → Cosmos Session top -->
  <line x1="322" y1="199" x2="322" y2="237" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cosmos Product right → Search left -->
  <line x1="349" y1="172" x2="427" y2="172" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- NODE 1 · Browser  (icon box x=32 y=146) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="32" y="146" width="54" height="52" rx="9" fill="url(#card)" stroke="#233055" stroke-width="1"/>
  <!-- Browser window chrome -->
  <rect x="38" y="153" width="42" height="30" rx="3" fill="none" stroke="#5a8eff" stroke-width="1.5"/>
  <rect x="38" y="153" width="42" height="9" rx="3" fill="#5a8eff" opacity="0.18"/>
  <circle cx="43" cy="157.5" r="1.8" fill="#ff5f57"/>
  <circle cx="48.5" cy="157.5" r="1.8" fill="#febc2e"/>
  <circle cx="54" cy="157.5" r="1.8" fill="#28c840"/>
  <rect x="40" y="168" width="30" height="2.5" rx="1" fill="#5a8eff" opacity="0.35"/>
  <rect x="40" y="173" width="22" height="2.5" rx="1" fill="#5a8eff" opacity="0.25"/>
  <rect x="40" y="178" width="27" height="2.5" rx="1" fill="#5a8eff" opacity="0.2"/>
  <!-- Label -->
  <text x="59" y="210" text-anchor="middle" fill="#8ab0d0" font-size="10" font-weight="600">Browser</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- NODE 2 · Azure Web App  (x=164 y=146) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="164" y="146" width="54" height="52" rx="9" fill="url(#card)" stroke="#233055" stroke-width="1"/>
  <!-- Globe -->
  <circle cx="191" cy="172" r="19" fill="none" stroke="#0078d4" stroke-width="1.5"/>
  <ellipse cx="191" cy="172" rx="8" ry="19" fill="none" stroke="#0078d4" stroke-width="1" opacity="0.55"/>
  <line x1="172" y1="172" x2="210" y2="172" stroke="#0078d4" stroke-width="1" opacity="0.7"/>
  <line x1="174" y1="163" x2="208" y2="163" stroke="#0078d4" stroke-width="0.8" opacity="0.45"/>
  <line x1="174" y1="181" x2="208" y2="181" stroke="#0078d4" stroke-width="0.8" opacity="0.45"/>
  <text x="191" y="210" text-anchor="middle" fill="#8ab0d0" font-size="9.5" font-weight="600">Azure Web App</text>
  <text x="191" y="221" text-anchor="middle" fill="#4a6278" font-size="8.5">(e-commerce web)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- NODE 3 · Azure Storage  (x=296 y=56) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="296" y="56" width="54" height="52" rx="9" fill="url(#card)" stroke="#233055" stroke-width="1"/>
  <!-- Stacked discs -->
  <ellipse cx="323" cy="72" rx="19" ry="6" fill="#00bcd4" opacity="0.9"/>
  <rect x="304" y="72" width="38" height="11" fill="#00a4bc" opacity="0.85"/>
  <ellipse cx="323" cy="83" rx="19" ry="6" fill="#00a4bc" opacity="0.85"/>
  <rect x="304" y="83" width="38" height="9" fill="#0088a0" opacity="0.7"/>
  <ellipse cx="323" cy="92" rx="19" ry="6" fill="#0088a0" opacity="0.8"/>
  <text x="323" y="121" text-anchor="middle" fill="#8ab0d0" font-size="9.5" font-weight="600">Azure Storage</text>
  <text x="323" y="132" text-anchor="middle" fill="#4a6278" font-size="8.5">(Static content)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- NODE 4 · Cosmos DB – Product  (x=296 y=146) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="296" y="146" width="54" height="52" rx="9" fill="url(#card)" stroke="#233055" stroke-width="1"/>
  <!-- Planet + orbit ring -->
  <circle cx="323" cy="172" r="11" fill="#0050a8" opacity="0.55"/>
  <circle cx="323" cy="172" r="5.5" fill="#3d8ef8"/>
  <ellipse cx="323" cy="172" rx="20" ry="8" fill="none" stroke="#4f8ef7" stroke-width="1.5" transform="rotate(-28 323 172)"/>
  <text x="323" y="210" text-anchor="middle" fill="#8ab0d0" font-size="9.5" font-weight="600">Azure Cosmos DB</text>
  <text x="323" y="221" text-anchor="middle" fill="#4a6278" font-size="8.5">(Product Catalog)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- NODE 5 · Cosmos DB – Session  (x=296 y=237) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="296" y="237" width="54" height="52" rx="9" fill="url(#card)" stroke="#233055" stroke-width="1"/>
  <!-- Planet + orbit ring (purple) -->
  <circle cx="323" cy="263" r="11" fill="#5a1fa0" opacity="0.5"/>
  <circle cx="323" cy="263" r="5.5" fill="#9050d8"/>
  <ellipse cx="323" cy="263" rx="20" ry="8" fill="none" stroke="#9050d8" stroke-width="1.5" transform="rotate(-28 323 263)"/>
  <text x="323" y="301" text-anchor="middle" fill="#8ab0d0" font-size="9.5" font-weight="600">Azure Cosmos DB</text>
  <text x="323" y="312" text-anchor="middle" fill="#4a6278" font-size="8.5">(Session State)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- NODE 6 · Azure Search  (x=428 y=146) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="428" y="146" width="54" height="52" rx="9" fill="url(#card)" stroke="#233055" stroke-width="1"/>
  <!-- Magnifying glass -->
  <circle cx="451" cy="168" r="13" fill="none" stroke="#0078d4" stroke-width="2"/>
  <circle cx="451" cy="168" r="5" fill="#0078d4" opacity="0.22"/>
  <!-- cross-hair inside lens -->
  <line x1="447" y1="168" x2="455" y2="168" stroke="#0078d4" stroke-width="1" opacity="0.6"/>
  <line x1="451" y1="164" x2="451" y2="172" stroke="#0078d4" stroke-width="1" opacity="0.6"/>
  <!-- handle -->
  <line x1="460" y1="177" x2="471" y2="188" stroke="#0078d4" stroke-width="2.5" stroke-linecap="round"/>
  <text x="455" y="210" text-anchor="middle" fill="#8ab0d0" font-size="9.5" font-weight="600">Azure Search</text>
  <text x="455" y="221" text-anchor="middle" fill="#4a6278" font-size="8.5">(Full-Text Index)</text>
</svg>
